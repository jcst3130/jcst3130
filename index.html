<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Five in a Row</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: #eee;
      font-family: 'Segoe UI', sans-serif;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
      padding: 16px;
    }

    h1 {
      font-size: 1.8rem;
      margin-bottom: 8px;
      color: #f0c040;
      letter-spacing: 2px;
    }

    #status {
      font-size: 1.1rem;
      margin-bottom: 12px;
      min-height: 1.4em;
      color: #ccc;
    }

    #board-wrapper {
      overflow: auto;
      max-width: 100vw;
      max-height: 80vh;
      border: 2px solid #444;
      border-radius: 4px;
      background: #16213e;
    }

    #board {
      display: grid;
      grid-template-columns: repeat(50, 18px);
      grid-template-rows: repeat(50, 18px);
      gap: 1px;
      background: #333;
      padding: 1px;
      cursor: pointer;
    }

    .cell {
      width: 18px;
      height: 18px;
      background: #0f3460;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 12px;
      line-height: 1;
      transition: background 0.1s;
      user-select: none;
    }

    .cell:hover:not(.taken) {
      background: #1a4a80;
    }

    .cell.human::after {
      content: '😊';
    }

    .cell.computer {
      position: relative;
    }

    .cell.computer::after {
      content: '';
      display: block;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      background: radial-gradient(circle at 35% 35%, #ff6b6b, #c0392b);
      box-shadow: 0 0 4px #c0392b88;
    }

    .cell.win-highlight {
      background: #2e7d32 !important;
    }

    #overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.7);
      align-items: center;
      justify-content: center;
      z-index: 10;
    }

    #overlay.active {
      display: flex;
    }

    #result-box {
      background: #16213e;
      border: 2px solid #f0c040;
      border-radius: 12px;
      padding: 32px 48px;
      text-align: center;
    }

    #result-msg {
      font-size: 1.8rem;
      margin-bottom: 20px;
      color: #f0c040;
    }

    button {
      background: #f0c040;
      color: #1a1a2e;
      border: none;
      padding: 10px 28px;
      font-size: 1rem;
      font-weight: bold;
      border-radius: 6px;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover { background: #ffd060; }

    #legend {
      display: flex;
      gap: 24px;
      margin-bottom: 10px;
      font-size: 0.9rem;
    }

    .legend-item { display: flex; align-items: center; gap: 6px; }
  </style>
</head>
<body>
  <h1>Five in a Row</h1>
  <div id="legend">
    <div class="legend-item">
      <span style="font-size:18px">😊</span> You (Human)
    </div>
    <div class="legend-item">
      <span style="display:inline-block;width:14px;height:14px;border-radius:50%;background:radial-gradient(circle at 35% 35%,#ff6b6b,#c0392b);vertical-align:middle"></span> Computer
    </div>
  </div>
  <div id="status">Your turn — click a cell to place 😊</div>
  <div id="board-wrapper">
    <div id="board"></div>
  </div>

  <div id="overlay">
    <div id="result-box">
      <div id="result-msg"></div>
      <button id="restart-btn">Play Again</button>
    </div>
  </div>

  <script>
    const ROWS = 50, COLS = 50, WIN = 5;
    const HUMAN = 1, COMP = 2;

    let board, currentTurn, gameOver;

    function initGame() {
      board = Array.from({ length: ROWS }, () => new Array(COLS).fill(0));
      currentTurn = HUMAN;
      gameOver = false;
      document.getElementById('overlay').classList.remove('active');
      document.getElementById('status').textContent = 'Your turn — click a cell to place 😊';
      renderBoard();
    }

    function renderBoard() {
      const container = document.getElementById('board');
      container.innerHTML = '';
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const cell = document.createElement('div');
          cell.className = 'cell';
          cell.dataset.r = r;
          cell.dataset.c = c;
          if (board[r][c] === HUMAN) cell.classList.add('human', 'taken');
          else if (board[r][c] === COMP) cell.classList.add('computer', 'taken');
          container.appendChild(cell);
        }
      }
    }

    function getCell(r, c) {
      return document.querySelector(`#board .cell[data-r="${r}"][data-c="${c}"]`);
    }

    function updateCell(r, c) {
      const cell = getCell(r, c);
      if (!cell) return;
      cell.className = 'cell';
      if (board[r][c] === HUMAN) cell.classList.add('human', 'taken');
      else if (board[r][c] === COMP) cell.classList.add('computer', 'taken');
    }

    document.getElementById('board').addEventListener('click', (e) => {
      if (gameOver || currentTurn !== HUMAN) return;
      const cell = e.target.closest('.cell');
      if (!cell || cell.classList.contains('taken')) return;
      const r = +cell.dataset.r, c = +cell.dataset.c;
      placeMove(r, c, HUMAN);
    });

    document.getElementById('restart-btn').addEventListener('click', initGame);

    function placeMove(r, c, player) {
      board[r][c] = player;
      updateCell(r, c);

      const win = checkWin(r, c, player);
      if (win) {
        win.forEach(([wr, wc]) => {
          const el = getCell(wr, wc);
          if (el) el.classList.add('win-highlight');
        });
        gameOver = true;
        const msg = player === HUMAN ? '😊 You win!' : '🔴 Computer wins!';
        document.getElementById('result-msg').textContent = msg;
        document.getElementById('overlay').classList.add('active');
        return;
      }

      if (isBoardFull()) {
        gameOver = true;
        document.getElementById('result-msg').textContent = "It's a draw!";
        document.getElementById('overlay').classList.add('active');
        return;
      }

      if (player === HUMAN) {
        currentTurn = COMP;
        document.getElementById('status').textContent = 'Computer is thinking…';
        setTimeout(doComputerMove, 80);
      } else {
        currentTurn = HUMAN;
        document.getElementById('status').textContent = 'Your turn — click a cell to place 😊';
      }
    }

    function doComputerMove() {
      const [r, c] = bestMove();
      placeMove(r, c, COMP);
    }

    // ── AI: medium difficulty heuristic ──────────────────────────────────────

    const DIRS = [[0,1],[1,0],[1,1],[1,-1]];

    function scoreLine(r, c, dr, dc, player) {
      let count = 1, openEnds = 0;
      for (let d = 1; d < WIN; d++) {
        const nr = r + dr*d, nc = c + dc*d;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) break;
        if (board[nr][nc] === player) count++;
        else { if (board[nr][nc] === 0) openEnds++; break; }
      }
      for (let d = 1; d < WIN; d++) {
        const nr = r - dr*d, nc = c - dc*d;
        if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS) break;
        if (board[nr][nc] === player) count++;
        else { if (board[nr][nc] === 0) openEnds++; break; }
      }
      if (count >= WIN) return 1000000;
      if (openEnds === 0) return 0;
      return [0, 1, 10, 100, 1000, 100000][Math.min(count, 5)] * openEnds;
    }

    function scoreCell(r, c, player) {
      let s = 0;
      for (const [dr, dc] of DIRS) s += scoreLine(r, c, dr, dc, player);
      return s;
    }

    function bestMove() {
      // Only consider cells near existing pieces (within radius 2)
      const candidates = new Set();
      let hasAny = false;
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          if (board[r][c] !== 0) {
            hasAny = true;
            for (let dr = -2; dr <= 2; dr++) {
              for (let dc = -2; dc <= 2; dc++) {
                const nr = r+dr, nc = c+dc;
                if (nr >= 0 && nr < ROWS && nc >= 0 && nc < COLS && board[nr][nc] === 0) {
                  candidates.add(nr * COLS + nc);
                }
              }
            }
          }
        }
      }

      if (!hasAny) {
        // First move: play near center
        return [Math.floor(ROWS/2), Math.floor(COLS/2)];
      }

      let best = -Infinity, bestR = -1, bestC = -1;
      for (const key of candidates) {
        const r = Math.floor(key / COLS), c = key % COLS;
        // Temporarily place to score
        board[r][c] = COMP;
        const attackScore = scoreCell(r, c, COMP);
        board[r][c] = 0;

        board[r][c] = HUMAN;
        const defenseScore = scoreCell(r, c, HUMAN);
        board[r][c] = 0;

        // Weighted: attack slightly preferred, but block serious threats
        const score = Math.max(attackScore, defenseScore * 1.1);
        if (score > best) {
          best = score;
          bestR = r; bestC = c;
        }
      }
      return [bestR, bestC];
    }

    // ── Win detection ─────────────────────────────────────────────────────────

    function checkWin(r, c, player) {
      for (const [dr, dc] of DIRS) {
        const cells = [[r, c]];
        for (let d = 1; d < WIN; d++) {
          const nr = r+dr*d, nc = c+dc*d;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || board[nr][nc] !== player) break;
          cells.push([nr, nc]);
        }
        for (let d = 1; d < WIN; d++) {
          const nr = r-dr*d, nc = c-dc*d;
          if (nr < 0 || nr >= ROWS || nc < 0 || nc >= COLS || board[nr][nc] !== player) break;
          cells.push([nr, nc]);
        }
        if (cells.length >= WIN) return cells;
      }
      return null;
    }

    function isBoardFull() {
      return board.every(row => row.every(v => v !== 0));
    }

    initGame();
  </script>
</body>
</html>
